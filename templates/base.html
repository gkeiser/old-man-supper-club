{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Old Man Supper Club{{end}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c49b66;
            --dark: #1a1a1a;
            --light: #f4f4f4;
            --accent: #e67e22;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark);
            color: var(--light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            letter-spacing: 1px;
        }

        .navbar {
            padding: 1rem 2rem;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            flex-wrap: wrap;
        }

        .navbar a {
            color: var(--light);
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .navbar a:hover {
            color: var(--primary);
        }

        .navbar .nav-links {
            display: flex;
            align-items: center;
        }

        .hero {
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('/assets/background.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            margin-top: 0;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: var(--primary);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .container {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .card {
            background: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-bottom: 3px solid var(--primary);
        }

        .card-body {
            padding: 1.5rem;
        }

        .card h3 {
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: #2a2a2a;
            border: 1px solid #444;
            color: var(--light);
            border-radius: 4px;
        }

        .btn {
            background: var(--primary);
            color: var(--dark);
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            text-decoration: none;
        }

        .btn:hover {
            background: var(--accent);
        }

        footer {
            text-align: center;
            padding: 4rem 2rem;
            background: #111;
            color: #666;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 3rem;
            }
            .navbar {
                padding: 0.5rem 1rem;
                justify-content: center;
            }
            .navbar .nav-links {
                width: 100%;
                justify-content: center;
                margin-top: 0.5rem;
                overflow-x: auto;
                padding-bottom: 5px;
            }
            .navbar a {
                margin: 0 0.5rem;
                font-size: 0.8rem;
            }
            .container {
                padding: 0 1rem;
                margin-top: 6rem; /* Adjust for taller wrapped navbar */
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/" style="font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-left: 0; color: var(--primary);">OMSC</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/leaderboard">Leaderboard</a>
            {{if .IsAuthenticated}}
                <a href="/add-restaurant">Add Restaurant</a>
                <a href="/logout">Logout</a>
            {{else}}
                <a href="/login">Login</a>
            {{end}}
        </div>
    </nav>

    {{template "content" .}}

    <footer>
        &copy; 2026 Old Man Supper Club. Est. 1954. All rights reserved.
    </footer>

</body>
</html>
{{end}}
