services:
  - type: web
    name: old-man-supper-club
    env: go
    buildCommand: go build -o server ./cmd/web/main.go
    startCommand: ./server
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: supper-club-db
          property: connectionString
      - key: PORT
        sync: false
        default: 3000

databases:
  - name: supper-club-db
    plan: free
